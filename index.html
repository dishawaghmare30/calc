<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Premium Glass Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="calculator">

  <!-- MENU -->
  <div class="menu" id="menuBtn">☰<br>MENU</div>

  <div id="menuBox" class="menu-box">
    <p id="resetBtn">🔄 Reset</p>
    <p id="themeBtn">🌙 Toggle Theme</p>
    <p id="historyBtn">📜 History</p>
    <p id="aboutBtn">ℹ️ About</p>
  </div>

  <!-- SCREEN -->
  <div class="screen">
    <div id="expression" class="expression">0</div>
    <div id="result" class="result">0</div>
  </div>

  <!-- BUTTONS -->
  <div class="buttons">
    <button data-value="C">C</button>
    <button data-value="%">%</button>
    <button data-value="DEL">⌫</button>
    <button data-value="/">÷</button>

    <button data-value="7">7</button>
    <button data-value="8">8</button>
    <button data-value="9">9</button>
    <button data-value="*">×</button>

    <button data-value="4">4</button>
    <button data-value="5">5</button>
    <button data-value="6">6</button>
    <button data-value="-">−</button>

    <button data-value="1">1</button>
    <button data-value="2">2</button>
    <button data-value="3">3</button>
    <button data-value="+">+</button>

    <button data-value="0">0</button>
    <button data-value="00">00</button>
    <button data-value=".">.</button>
    <button data-value="=">=</button>
  </div>

 

</div>

<script src="script.js"></script>
</body>
</html>
